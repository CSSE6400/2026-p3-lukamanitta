 services:
   database:
    image: postgres:18.3
    restart: always
    environment:
      POSTGRES_PASSWORD: verySecretPassword
      POSTGRES_USER: administrator
      POSTGRES_DB: todo
    healthcheck:
      test: pg_isready -h localhost -d $$POSTGRES_DB -U $$POSTGRES_USER
      interval: 5s
      timeout: 15s
      retries: 5
    volumes:
      - ./data:/var/lib/postgresql
   app:
    build: .
    restart: always
    environment:
      SQLALCHEMY_DATABASE_URI: "postgresql:\
       //administrator:verySecretPassword@database:5432/todo"
    ports:
      - "6400:6400"
    depends_on:
      - database
